front:
  text: 長生胎元神用經典十
  hash: sha256:f680b713d43fc0744df85bc9132df52be42e6bc2b07463723f091cf189b87e9f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0214_SJB_000-340309c, image: sjb/34/340309c.png}
body:
  text: 野人郎肇注師曰知至道者天不煞服元炁者地不滅夫至道不遠秖在己身用心精微命乃長久劉君祕㫖曰欲得長生當修所生所生之法始用精微炁結爲形形是受炁之本宗炁是形之根元元炁禀形之由可察滅形之理經云深根固蒂長生久視之道元炁是身之根蒂夫若固其元炁自然長生之道形中子母何不守之且神以炁爲母母即以神爲子子因呼吸之炁而成形故爲母也形炁旣立而後有神神聚爲子也夫呼吸之炁由於玄牝之門鼻主清炁爲陽口主濁炁爲陰夫欲修習但泯其念外絶思慮内守神眞每欲修習之時先須調炁調炁之法鼻微微納清炁口微微吐濁炁止十下二十下即閉口一任神炁綿綿出入鼻所納炁以意想至下元玄珠蒙蒙四合即存玄珠爲下元之主不得生思生思不成積習之自然凝結成珠習爲母也旣有其母必有其子功限遲疾其在志焉勿思外機一心存神速成長生至矣夫神與炁相合以意引之循環臟腑之内馭呼吸以上下久習之後則神自眀而炁自和明照五臟細功成後内視見其眞神矣炁和而浹通於四肢隨意而到亦可治他人之疾也黄帝内視三月而生神心神則化生纒綿五臟斯言可推而得之黄帝得此訣内視三月而神全則乃生天矣列子得之九年成道遲速由其志也元炁隨意靜即得炁道通流形體自康玄珠爲主神自光明也今世人神與炁子母各行俱不相守雖然呼吸於内神常運物於外如此之道遂使炁无主掌而不通徹旣不通徹而精自散又以神爲主人形爲宅舍主人不營於内而日用於外自然宅舍空虛而形體衰矣况乎人世之道晝夜百刻之中炁於形内緫一萬三千五百息長八萬一千寸皆外役其神炁無一息住於内而冀長生不亦遠矣先生曰若神炁主子母之運行而乃長生不死若無主掌任自呼吸唯主通利臟腑消化水穀而已不能還陰返陽填補血腦得此修息之門元炁結而成胎胎中有神神全使其元炁夫若未得此訣自然炁無主掌徒致功勤不窮受炁之元空傳於呼吸元炁若全以意想下元炁散在於四肢遂使肌膚充悅也師曰吾以神爲車以炁爲馬終日驅驅而不倦常存想神與元炁相合隨意而動之不倦故爲車馬也又曰神能驅炁則鼻不失息其言至矣神在玄珠之中常與元炁主一呼一吸皆内想見其眞神故稱爲之主掌令神炁混合而鼻不失息驅炁之法上至泥丸下至命門泥丸在腦爲上元命門在臍下三寸黄庭經云後有宻户前生門近腰脊之末以認下元也仙經至道方說泄露因感而言之二景相蓮可救老殘夫存養下宫元炁滿則使炁溯流上入泥丸宫是名還精補腦故曰二景相通也若呼不得神宰一息不全若吸不得神宰亦一息不全若能息息之中神與炁常合是謂神炁全也夫治炁者出炁爲之息吸者從鼻中入想至下元玄珠口中與神相合也唯澄心腹目視呼吸修行之時存想見其眞神爲之一息全也目瞥然生外想神以隨意在外唯見外景中事使内炁无主掌謂之息不全也又曰胎從服炁中結炁從有胎中息胎若内結求死不得也服元炁有息者返覆言義也以鼻中納炁以意送下元中久習自然凝結成胎胎因元炁結而成胎中元炁而有息息由不可也子猶神也人如初受胎漸漸而成形仙經曰成功之後男子關元炁聚精女人胎澤不結嬰雖動於慾不能與神爭此是成胎之中眞返精爲神此是上清也夫自修之訣能出入陰陽合其眞矣每取夜半之後五更睡覺之初先以舌漱掠唇齒之間澧濁津液吐出三口鼻收清涼炁入於𦚾膈之中淘隔宿來穢滯之炁呵出三口良久咽吹即仰卧展其兩手足叩齒九遍次依尋常喘息吐納不得極深直候喘息炁平内不出外外不入内閉炁咽元炁一咽以手隨意炁摩下引至炁海之中二十日後炁通滑又加一咽不用將手摩引經兩月后更加一咽一炁三咽一年後一炁四咽無所妨損每日子後午前空腹咽之時時十咽五咽不得吸入外炁每至子前午後不得咽之經曰子後午前皆屬於陽子前午後謂之陰夫休粮者每至食時漱口存想上元兩條白炁從腦中出大如布線沿流項至背膂過入於臍下炁海之中漸漸聚炁如雞子大一團香馥自然不飢不得雜想恐有忤亂或有疾病口乾舌澁喉中咽塞皆是上焦熱極即以五更鼻吸清涼之炁入𦚾膈淘蕩却呵出三五十止一二百呵漸覺口中甘甜是熱退散即住不得過妄如水蔵泠即以早晨日出之時鼻搐陽炁以口吹出百十吹泠炁如有病苦之處一切疼痛蛇蝎蜇咬狼狗所傷但以靜意坐卧閉炁存想所患之處以炁攻之一二百度無不痊愈也冬月脚泠但以咽熱炁以意存想直至脚心下暖即住如飲酒小户者但隨器物旋旋呵出麵麴之毒力即不醉也赤水者血也玄珠者炁也炁者神也每修習之時面東或南而坐兀然冥目以目存想下丹田臍下三寸兩腎之間方三寸左青右黄上白下黑中赤之炁口訣曰大如彈丸黄如橘有光焰上一赤子名元先字帝卿中一眞人名子丹字光堅下一嬰兒名元陽字谷元其神身長各三寸擐赤衣赤履坐金牀手把金爐玉匕具晝在上丹田夜在下丹田即說陰丹七返水唾血精腦神炁也夫欲養神先須養炁養炁先須養腦養腦先須養精養精先須養血養血先須養唾養唾先須養水水者五華之津五味之精當在舌下兩齒之間傍名曰水池咽下肺脉之主則化爲唾唾入心之間則化爲血血二百五十日入腎脉中則化爲精精入腦脉之中則化爲泥丸宫宫中有兩條脉夾脊膂流下貫入於炁海之中夫炁海王則聦明也眞人曰仙家大忌嗔怒不得亂泄言語賢君祕之導引訣兩手相挼如洗面兩手相擦令熱揩面令面无皺如戰士挽硬弓左右三遍握拳左右前築數回兩手各向上如托千斤石左右同大坐握固斜身如排山左右同以拳慢舒向前急掣向後兩手抱頭宛轉名抽關兩拳據地縮身曲脊上下三舉兩拳各返搥背三下大坐伸脚用手叉返掣數回起立以手叉腰拗身向後三回熱挼手熨兩脚心與腿膝未起兩手相叉夾項爭力數廻殷伸返張側掣宣摇百關挼兩手令熱鬱兩目引至耳前兩手旋耳三十遍時時作之挼手令熱按鼻兩傍閉炁爲之氣通即止眞人曰長生時子後午前咽津七遍閉目平坐内視存見五臟六腑夫若久久行之自然明了夫初學服炁即須耳无所聞心无所思漸起於三息五息一舒炁更漸吸之若止十二息不舒炁得小通也百二十不舒得大通也夫清齋休粮存日月在於口中晝存日夜存月大如環日色赤有紫光九芒月色黄有白光十芒存日月在於明堂中日在左月在右常存咽芒之炁液如睡存日在額上月在臍下若身有不安反舌塞喉咽唾无數退即住天炁所在隨神炁之所生神在則炁成神去則炁虛炁者二十四神之正炁炁亦成神神亦成炁炁散則爲雲霧炁合則爲形影出化爲仙入化爲眞上結三元下結萬物存帝一眞君祝名都閉目存諸百神變成白炁如烟之狀從玄珠中出莖孔中來入我口中鬱鬱良久覺見白炁下出莖孔出兩脚底出兩脚心出冠纒中乃至一身與白炁同煙上下良久白炁忽變紫雲鬱鬱入我口内歸於頭中下五臟中充滿腹内又從兩脚心出兩手心出下至莖孔冠纒中一身鬱鬱上下與紫雲合形不相見也須臾又存想紫炁充滿左右一室之内又存想口出風炁扇於紫雲徘徊轉繞成一眞人男形身長三寸號曰大洞帝一尊君又存尊君直來入口中舌下又上昇紫房中六合宫内端坐向外尊君左手把兆五籍右手把兆五符尊君口左邊有日光九分尊君口右邊有月光鬱鬱或白或赤常光炁下入五臟六腑百節之内一身之中狀如白日宜心咒曰大洞帝一太素尊靈父寧母靜二合雙成百眞大混一回性生身結八烟乃變元嬰日月寳光動我體形太一在上願與帝并泥丸寳玉五臟華明長合日月手執洞經立爲仙公神昇上清三十九童全符羽庭常存大洞帝一尊君在於鼻下人中上唇内齒内外坐立起居常須在意尊君口銜日月明照萬洞未行炁時先存心中燭火燒遍身上下蕩除五穀之炁毒若不燒之必能擁寒燒不可久久即令人煩燥存火訖即須行炁不得雜想任炁微微元炁自通徹以意行之欲行炁道先須斷穀漸漸學之不宜頓也一年之后炁道充實自然不飢腎神六人司徒司録司命司隸校尉卿左右分爲八百五十日月精靈之炁人之根本左爲玄妙君右爲玄元君虛无相生寒暑相成冲和先生授龍崗服炁訣夫形之所恃者炁也炁之所依者形也炁全形全炁竭形斃是以攝養之士莫不煉形炁而保其生未有有形而無炁有炁而无形者也即形之與炁相須而成豈不皎然哉余夙慕至道披尋經史自行守愼約向十餘載所見所聞殊不愜心於大歷年中遭遇羅浮王公自北嶽而返倚策郵亭依然相顧余意其異人也延之與語果乃有道之君子哀余懇志之心便賜吐納修眞之道悉傳於口其人言五牙六字及諸服炁法皆爲收炁收炁剛勁非俗中之士所宜也至如納炁是曰胎息唯有行炁是正道修身之基本也進取訣凡欲服炁先須高雅宻室常以左右焚薰陸香仍以牀薦厚軟高三二尺温暖枕高一寸夜半之後生炁之時五更睡覺之初呵出腹中濁炁九通若要調息即不在半夜五更但看天炁柔和腹空之時導引行炁閉目叩齒三十六通以警身中神以手按目兩眥按鼻左右旋耳摩面拔關托石隨事少少引宣暢百節乃以舌柱上腭欲掠津液滿口中即以咽下三通使進於五臟面有光澤兀然放神縱心自在如大空身萬累都遣然後淘之皆須閉口握固以閉玄房與却精邪初學服炁炁未流行不得握固待到百日止半年覺神炁通暢身上汗出可握固爲之淘炁訣凡人五臟各有一神夜卧閉息如覺後服炁先乃淘轉腹内令宿食故炁得出然後調脉其法仰卧閉目握固仍兩拳於乳側竖兩膝舉背及尻閉炁鼓海中之炁使内外斡而轉之呵出一九遍則調之調炁訣夫調炁之時妙在乎咽世人因依外炁以爲内炁而不能分别吐納在宻而用炁勿使錯忤故知人禀天地而生身自有元炁而理每咽納則内炁與外炁相應自然海中隨炁而至收吐候中旦吐納之際則輙閉口速鼓而咽之令使郁郁然有聲汨汨左邊而下經二十節如水瀝坎聞之分眀也别從右而下如此則内炁皎然而别以意送下用手摩之令入炁海炁海臍下三寸亦謂之下丹田初服炁人上焦未通以手摩而助之速令快下咽或未下微用少力蹙而咽之務令有聲而下若覺炁通流不摩亦得三閉口三連咽更二乾咽號曰雲行一濕咽取口中津液和而咽之謂之雨施初服炁人炁未通流每一兩咽則施行之不遽得三連咽也一年細功方得小成二年三年方得大功也行炁訣曰下丹田近後有二穴通於脊脉上連泥丸泥丸腦宫每三連咽則速存歸下丹田中以意想此元炁令入二穴作兩條白炁夾脊雙引上入泥丸薰蒸諸宫森然遍下毛髮頭面項頸兩臂手指一時下入𦙄膈五臟皮膚中丹田心宫次第灌注却歷下丹田至於三三星遍尻腦下入膝踝達於涌泉脚心也所爲分一炁而理鼓之以雷霆潤之以風雨亦由天地之有泉源非雲雷而騰動則无以潤於萬物人有津液非漱咽則无以灌於五臟還精補腦非交合則不能走而上之咽服内炁非吐納則不能相引而用之是知淡泊之道運用之理所以法天像地也夫存想身中濁惡結滯邪炁淤血被正炁盪滌皆從手足指節端然而出爲之散炁則展手指不須握固如此一度則是一通通則無病又復調之使炁平平又復鼓咽一如前也閑鼓咽至三十六咽爲之小成也若未絶粒常須少食務令腹空然得虛靜无問坐卧腹空則咽之十度自然三百六十咽矣若久服炁通頓至三百六十亦得爲之中成一千二百息爲之大成如不能煉形易質凡同枯木无精光也煉炁訣曰餘暇服炁入室脫衣散髮仰卧舒展兩手勿得握固梳頭髮令布於席上則以調炁咽之訖便乃冥心絶想任炁所行如過理絶悶即以吐之喘息稍急則須調之候炁通流漸漸加至二十三十四十五十即令通身汗出如有此狀即是效也安心定意且卧勿起衝風候神情爽朗若炁昏欲卧勿得行炁四體不暢亦勿爲之十五日一度爲之閉炁訣曰忽有修養乖宜偶生病患速投宻室依調炁法布其手足則以調炁咽之想念所苦之處以意想注閉炁攻之若是炁極則調之訖更以相續不斷攻之炁急則止炁調亦復攻之或二十三十四十五十攻覺所苦䖏汗出通潤即止如未痊則每日半夜之後五更晝日之前頻頻作意攻以差爲度但有疾處攻之无不愈也布炁訣曰布炁與人療疾先問彼患人五臟所苦之處取己之炁布入彼人身止令病者面其方所息心靜慮此布炁亦似咽炁其疾自消百邪永絶矣調炁訣曰夫人食五味五味各歸一臟每臟濁炁皆納於口亦出於口又六腑三焦穢滯併投合成濁炁每至睡覺之初葷穢之炁自不堪聞凡口乾舌澁面兩頰光澤不能喫食此是上焦熱候即須依門户大開口一二十通即鳴天鼓七下九下即以咽之津液但候口中清甘泉出即是熱退五臟涼也若以口中津液泠淡食飲無味心間佯佯不受水穀即是泠候即以吹理之飲食守護訣曰凡服炁之人喫物須有避忌可食者物則食不可食者莫食食必有損正炁則脉亂有所益則常食无益勿食每日平旦食少淡粥或胡麻子粥益人脾炁兼足津液日午食少淡麵䬪飥餅亦得不得乘熱喫之恐亂正炁葱薤羹亦好諸飯食宜令軟熟甜淡大麥經四時好食不必多矣臨時堪食者食之若有人靜修齋戒亦昇仙矣三十六禽直日及本命屬並不可食棗栗芋子麥芡不宜多食發動邪炁有單南蜀草亦得食乍可微微似飢不得輙令傷飽飽則傷心五臟閉塞炁難行也熱物鹹酸辛辣陳敗之物炁難行也食了即須呵却腹中之毒炁令人腸胃虛靜若誤食一口毒物腹内有毒也切宜愼之每欲食時先須咽三五口炁與食爲主兼吞三二顆生黑豆引炁通三焦和臟腑明目驅趁惡物消穀食以助正炁功用不可備舉太清經中别有方法夫服炁後有穢炁下泄不可忍留恐疾生耳每日空腹隨性飲酒好者一杯冬即温飲夏即冷飲亦能助炁遣諸邪炁所戒在多多即昏亂醉即傷神减炁損壽若事不獲已且飲罷即呵出三五十下飲即大開口呵遣出麵麴毒即不醉也亦不中酒不失酒食味不用衝生産之家死亡之穢乘六畜走驟勿衝臭穢有損正炁若卒逢之速宜避之如惡炁入腹即以調炁盪滌逐出如飲酒即飲三兩杯不飲即用正炁淘出如不肯出不須過理逼之但任漸漸出之若此上三焦熱終須調炁理之使炁平和少食油膩勿令觸正炁若曾犯不令再犯服炁一年通三年功成元炁遂凝擬有觸犯不能爲患也日服千咽亦不懼多返也漸從此始矣經曰炁化爲血血化爲精精化爲髓一年易炁二年易血三年易脉四年易肉五年易髓六年易筋七年易骨八年易髮九年易形三萬六千神皆化爲仙號曰眞人矣修功不怠關節相連五臟相固内炁不出外炁不入寒暑不侵昇騰變化壽同三光休粮訣依前勤修三年之後正炁流通精髓實滿百神守衛三尸逃走自不欲聞五穀之炁常思不食要絶難也但覺腹空即須咽之无問早晩何須約限兼可以藥物相間服之人多不解服炁區區終日以藥爲務故爲未得亦非上士之用也黄庭經云百穀之實士地精五味外美邪魔腥臭亂神明胎炁零那能返老得還嬰三魂忽忽魄靡傾何不食炁太和精故能不死入黄寧守護訣云世人率多嗜慾古今共然仙經曰夫人臨終方始惜身罪足而思遷善病成而求其藥天網已發何以追之賢者固未危之命不依人寰攝心慕道道者炁也炁者身之主主者身之命命者身之根也若惜精保炁始全其生行炁訣曰道者炁也保炁得道即長生矣神者精也精在則神明精散則神去精者血脉之川流輔骨之靈液精盡則骨枯骨枯則死非固道矣道者務其精常須存守彭祖口付務成子曰唯閉其精不畏寒暑其人自然恬靜余數閉之經曰道不在煩能不思聲色不思榮辱不勞形體常須導引内炁安息可得千歲更求上藥可能長生如能不泄是名服精夫若萬慮皆息爲其寡慾可以增壽也每朝早旦未起之時先須叩齒七下至九下面東跪坐調炁平和鼻取清炁入口吐濁炁出以手相摩隨事導引舌柱上腭集漱津液滿口即咽三咽則止即以次消息頭上至脚心下各七遍爲之治諸骨節通流炁脉宣瀉滯濁用補虛勞也去三尸九蟲方夫尸者有九蟲一伏蟲長四分二蚘蟲長一尺三白蟲長一寸四肉蟲狀如爛杏五肺蟲狀如蠶六胃蟲狀如蝦蟇七膈蟲狀如瓜瓣八赤蟲狀如生肉九蟯蟲狀如菜蟲唯有伏蟲是諸蟲之主蚘蟲貫心則殺人白蟲相生子孫轉大至長四五尺亦能殺人肉蟲令人煩悶肺蟲令人咳嗽胃蟲嘔逆膈蟲令人好唾赤蟲令人腹鳴蟯蟲居人胴腸多則令人患癩痔亦爲瘡疥風等人身中皆有九種不必盡多别有治方管衆五分主蟯蟲白雚蘆十二分主蚘蟲蜀漆三分主白蟲蕪荑五分主肉蟲石蠶五分主伏蟲厚朴三分主脉蟲狼牙四分主胃蟲殭蠶四分主腸蟲雷丸子六分主赤蟲一名鴉獨二名士竽子藤如葛而細葉右件九味皆以文武火焙令黄細細搗羅錬蜜丸如桐子大每日粉漿水内服五丸一日三服加至十丸十二日微取滯濁六十日百病愈服者量力且令少即妙婦人若服即須齋戒即得服之長生胎元神用經
